name: refresh-active

# Daily refresh of the active-mode deck. Pipeline:
#   07_fetch_active.py  -> data/active_markets.parquet         (gamma fetch)
#   08_classify_active  -> data/active_markets_classified.parquet  (gemini, incremental)
#   09_export_active    -> web/data/markets-active.json + sidecars (yn applied here)
# Then: smoke check, DATA_V bump to short SHA, content-hash diff gate,
# commit + push to main. Cloudflare Pages auto-deploys on the push.
#
# Caches (actions/cache) persist 08's progress jsonl and 09's descriptions
# jsonl across runs so 08 only classifies the daily delta (a few hundred
# markets) instead of the full 7000+ deck (which would burn ~$5/day on
# gemini and break the cost-bounded incremental design).

on:
  schedule:
    # 06:00 UTC daily. Low Polymarket activity window, well after US/EU
    # primetime closes. Adjust if it ever clashes with anything.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # manual trigger from Actions tab

permissions:
  contents: write  # needed for git push of regenerated bundle

concurrency:
  group: refresh-active
  cancel-in-progress: false  # let an in-flight run finish before starting another

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so the diff-gate step can compare against the
          # previous markets-active.json content hash.
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow google-generativeai

      - name: Restore pipeline caches
        uses: actions/cache@v4
        with:
          path: |
            data/active_classification_progress.jsonl
            data/active_descriptions.jsonl
          # Static key: we always want the latest cache. Save step at the
          # end overwrites by appending. 7-day TTL on GHA cache means a
          # week of dormancy resets us to cold; that's fine.
          key: predictopoly-active-pipeline-v1
          restore-keys: |
            predictopoly-active-pipeline-

      - name: Promote just-closed actives into past deck (10)
        # MUST run before 07: 10 reads the previous run's
        # active_markets_classified.parquet to find what's expired since
        # yesterday, then 07 overwrites it with the new active set.
        # Non-fatal on failure - a gamma flap shouldn't block the daily
        # active refresh. Worst case the missed markets get promoted tomorrow.
        run: |
          set +e
          python scripts/10_promote_resolved.py
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::10_promote_resolved failed (rc=$rc); continuing with active refresh anyway"
          fi
          exit 0

      - name: Fetch active markets (07)
        # Two-level retry: _gamma_api.py handles per-request flaps (6 attempts,
        # exp backoff, ~5 min). This wrapper catches the case where gamma is
        # hard-down for a multi-minute stretch and retries the whole fetch once
        # after a 60s rest. Total tolerance ~10 min, well under the 30 min job
        # timeout. A single bad scrape window shouldn't fail the daily cron.
        run: |
          set +e
          python scripts/07_fetch_active.py
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::07_fetch_active failed (rc=$rc), sleeping 60s and retrying once"
            sleep 60
            python scripts/07_fetch_active.py
            rc=$?
          fi
          exit $rc

      - name: Classify (08, incremental)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/08_classify_active.py

      - name: Export to web bundle (09)
        run: python scripts/09_export_active_for_web.py

      - name: Re-export past deck (03) if promotions happened
        # Only useful when 10 actually appended rows. We detect that by
        # checking whether either of the two source parquets changed in
        # the working tree relative to HEAD. If yes, regenerate markets.json
        # + descriptions-*.json + slugs.json + taxonomy.json. If no, skip -
        # past bundle doesn't need a rebuild on quiet days.
        run: |
          if git diff --quiet data/resolved_markets_classified.parquet \
                              data/lookback_prices.parquet \
                              data/descriptions.jsonl; then
            echo "No promotions; skipping past-deck re-export."
            exit 0
          fi
          python scripts/03_export_for_web.py

      - name: Smoke check
        run: |
          python <<'PY'
          import json, sys
          m = json.load(open("web/data/markets-active.json"))
          if len(m) < 1000:
              sys.exit(f"FAIL: only {len(m)} markets, expected >=1000")
          required = {"id", "q", "c", "s", "p_now", "end"}
          missing = [r for r in m if not required.issubset(r)]
          if missing:
              sys.exit(f"FAIL: {len(missing)} records missing required fields")
          tax = json.load(open("web/data/taxonomy-active.json"))
          if len(tax) < 5:
              sys.exit(f"FAIL: taxonomy has only {len(tax)} categories")
          live_band = sum(1 for r in m if 0.05 <= r.get("p_now", 0) <= 0.95)
          if live_band < 100:
              sys.exit(f"FAIL: only {live_band} markets in 0.05-0.95 price band")
          print(f"OK: {len(m)} markets, {len(tax)} categories, {live_band} in live band")
          PY

      - name: Bump cache-bust SHAs (app.js DATA_V + index.html script tag)
        run: |
          SHA=$(git rev-parse --short HEAD)
          # 1) DATA_V inside app.js is used as ?v= on every data JSON fetch.
          #    Trailing semicolon kept. Single line so anchor is unique.
          sed -i 's|const DATA_V = "[^"]*";|const DATA_V = "'"$SHA"'";|' web/app.js
          grep -n "const DATA_V" web/app.js
          # 2) <script src="app.js?v=N"> in index.html. Without this bump the
          #    browser keeps the cached app.js (and its stale DATA_V), which
          #    then fetches stale data JSON. Was manually nudged by humans for
          #    months while the daily refresh quietly drifted on returning
          #    users' clients. Auto-bump to the same SHA so cache-busting is
          #    coupled to the data refresh.
          sed -i 's|app\.js?v=[^"]*"|app.js?v='"$SHA"'"|' web/index.html
          grep -n 'app\.js?v=' web/index.html

      - name: Diff gate + commit
        run: |
          set -e
          git config user.name "predictopoly-bot"
          git config user.email "bot@predictopoly.local"

          # If neither active deck nor past deck changed, skip the commit.
          # Past deck is checked via the source parquets so we don't have to
          # rebuild markets.json just to diff it.
          ACTIVE_CHANGED=0
          PAST_CHANGED=0
          git diff --quiet web/data/markets-active.json || ACTIVE_CHANGED=1
          git diff --quiet data/resolved_markets_classified.parquet \
                          data/lookback_prices.parquet \
                          data/descriptions.jsonl || PAST_CHANGED=1
          if [ $ACTIVE_CHANGED -eq 0 ] && [ $PAST_CHANGED -eq 0 ]; then
              echo "No deck changes (active or past); skipping commit."
              git checkout -- web/app.js web/index.html
              exit 0
          fi

          MARKETS_COUNT=$(python -c 'import json; print(len(json.load(open("web/data/markets-active.json"))))')
          PAST_COUNT=$(python -c 'import json; print(len(json.load(open("web/data/markets.json"))))')
          DATE=$(date -u +%Y-%m-%d)

          # Always add the active bundle + cache-bust SHAs. Past deck files
          # are conditionally added: parquets and web bundle only when a
          # promotion actually happened, otherwise git add would no-op them
          # (they're unchanged) and that's fine, harmless.
          git add web/data/markets-active.json \
                  web/data/slugs-active.json \
                  web/data/taxonomy-active.json \
                  web/data/descriptions-active.json \
                  web/app.js \
                  web/index.html
          if [ $PAST_CHANGED -eq 1 ]; then
              git add data/resolved_markets_classified.parquet \
                      data/lookback_prices.parquet \
                      data/descriptions.jsonl \
                      web/data/markets.json \
                      web/data/slugs.json \
                      web/data/taxonomy.json \
                      web/data/descriptions-0.json \
                      web/data/descriptions-1.json \
                      web/data/descriptions-2.json \
                      web/data/descriptions-3.json
              MSG="[bot] daily refresh ${DATE} - ${MARKETS_COUNT} active, ${PAST_COUNT} past"
          else
              MSG="[bot] daily refresh ${DATE} - ${MARKETS_COUNT} markets"
          fi
          git commit -m "$MSG"
          git push origin HEAD:main
